<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Editor Login - SongLyrics Projection</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #121212; color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }
        .header {
            padding: 20px; text-align: center;
            background: #1e1e1e; border-bottom: 2px solid #333;
            font-size: 1.5rem; font-weight: bold;
        }
        .header span {
            color: #64ffda;
        }
        .login-container {
            flex: 1; display: flex; flex-direction: column;
            padding: 30px 20px; justify-content: center; max-width: 400px; width: 100%; margin: 0 auto; box-sizing: border-box;
        }
        .login-container p {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        input {
            width: 100%; padding: 18px; border-radius: 12px; border: 2px solid #333;
            background: #1e1e1e; color: white; font-size: 1.2rem; box-sizing: border-box;
            outline: none; text-align: center; transition: border-color 0.2s;
        }
        input:focus {
            border-color: #64ffda; background: #2a2a2a;
        }
        .btn-submit {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            background: #2196f3; color: white; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-top: 10px;
            transition: all 0.2s;
        }
        .btn-submit:active {
            opacity: 0.8; transform: scale(0.98);
        }
        .error-msg {
            color: #ff5252; text-align: center; margin-bottom: 20px; font-weight: bold; padding: 10px; background: rgba(255, 82, 82, 0.1); border-radius: 8px; border: 1px solid rgba(255, 82, 82, 0.3);
        }
    </style>
</head>
<body>
    <div class="header">
        <span>Editor</span> Login
    </div>
    <div class="login-container">
        <p>Login to manage content without affecting the live projection.</p>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('editor.login') }}">
            <div class="form-group">
                <input type="text" name="username" placeholder="Username" required autocomplete="username" autocapitalize="none">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-submit">LOGIN TO EDITOR</button>
        </form>
    </div>
</body>
</html>
