<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SongLyrics Projection Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #0f0f13;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: auto;
        }
        .portal-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at top right, rgba(100, 255, 218, 0.1), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(33, 150, 243, 0.1), transparent 40%);
            z-index: 0;
        }
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(26, 26, 30, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 380px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .login-card h1 {
            font-weight: 800;
            font-size: 2rem;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #64ffda, #2196f3);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        .login-card p {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        input {
            width: 100%; padding: 16px; border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
            color: white; font-size: 1rem;
            outline: none; transition: all 0.3s;
            box-sizing: border-box;
            font-family: inherit;
        }
        input:focus {
            border-color: #64ffda;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(100, 255, 218, 0.1);
        }
        select {
            width: 100%; padding: 16px; border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.4);
            color: white; font-size: 1rem;
            outline: none; transition: all 0.3s;
            box-sizing: border-box;
            font-family: inherit;
            appearance: none;
            cursor: pointer;
        }
        select:focus {
            border-color: #64ffda;
            box-shadow: 0 0 0 4px rgba(100, 255, 218, 0.1);
        }
        select option {
            background: #1a1a1e;
            color: #fff;
        }
        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 16px; top: 18px;
            color: #888; pointer-events: none;
            font-size: 0.8rem;
        }
        .btn-submit {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: linear-gradient(90deg, #2196f3, #00bcd4);
            color: white; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(33, 150, 243, 0.3);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(33, 150, 243, 0.4);
        }
        .btn-submit:active {
            transform: translateY(0);
        }
        .error-msg {
            background: rgba(255, 82, 82, 0.1);
            color: #ff5252; padding: 12px; border-radius: 8px;
            margin-bottom: 25px; border: 1px solid rgba(255, 82, 82, 0.2);
            font-size: 0.9rem; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="portal-bg"></div>
    <div class="login-card">
        <h1>PORTAL ACCESS</h1>
        <p>Login to be routed to your workspace</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="error-msg">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group select-wrapper">
                <select name="destination" required>
                    <option value="auto">Auto-Detect Destination</option>
                    <option value="control">Admin Control Panel</option>
                    <option value="editor">Editor Dashboard</option>
                    <option value="remote">PPT Mobile Remote</option>
                </select>
            </div>
            <div class="form-group">
                <input type="text" name="username" placeholder="Username" required autocomplete="username" autocapitalize="none">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
        </form>
    </div>
</body>
</html>
