{% extends "layout.html" %}

{% block title %}Output - SongLyrics Projection{% endblock %}
{% block body_class %}output-page{% endblock %}

{% block content %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<style id="server-side-styles">
    /* Bible Styles (Reference, Content, and Parallel) */
    {% if settings.get('bible-header') %}
    #bible-reference {
        font-family: {{ settings['bible-header'].fontFamily | safe }};
        font-size: {{ settings['bible-header'].fontSize }};
        color: {{ settings['bible-header'].color }};
        text-shadow: {{ settings['bible-header'].textShadow }};
        text-transform: {{ settings['bible-header'].textTransform }};
        text-align: {{ settings['bible-header'].textAlign }};
        font-weight: {{ settings['bible-header'].fontWeight }};
        font-style: {{ settings['bible-header'].fontStyle }};
    }
    #bible-output { align-self: {{ settings['bible-header'].alignSelf or 'center' }}; }
    {% endif %}

    {% if settings.get('bible-content') %}
    #bible-text-content {
        font-family: {{ settings['bible-content'].fontFamily | safe }};
        font-size: {{ settings['bible-content'].fontSize }};
        color: {{ settings['bible-content'].color }};
        text-shadow: {{ settings['bible-content'].textShadow }};
        text-transform: {{ settings['bible-content'].textTransform }};
        text-align: {{ settings['bible-content'].textAlign }};
        font-weight: {{ settings['bible-content'].fontWeight }};
        font-style: {{ settings['bible-content'].fontStyle }};
    }
    {% endif %}

    {% if settings.get('bible-parallel') %}
    #bible-parallel-content {
        font-family: {{ settings['bible-parallel'].fontFamily | safe }};
        font-size: {{ settings['bible-parallel'].fontSize }};
        color: {{ settings['bible-parallel'].color }};
        text-shadow: {{ settings['bible-parallel'].textShadow }};
        text-transform: {{ settings['bible-parallel'].textTransform }};
        text-align: {{ settings['bible-parallel'].textAlign }};
        font-weight: {{ settings['bible-parallel'].fontWeight }};
        font-style: {{ settings['bible-parallel'].fontStyle }};
    }
    {% endif %}
</style>

<div id="media-background-container" class="media-background">
    <div id="media-layer-1" class="media-layer">
        <video class="bg-media video-el hidden" autoplay loop muted playsinline></video>
        <img class="bg-media img-el hidden">
        <iframe class="bg-media iframe-el hidden" frameborder="0" allowusermedia
            allow="camera *; microphone *; autoplay *; display-capture *; fullscreen *; clipboard-read; clipboard-write"
            style="border:none; width:100%; height:100%; position:absolute; top:0; left:0;"></iframe>
    </div>
    <div id="media-layer-2" class="media-layer">
        <video class="bg-media video-el hidden" autoplay loop muted playsinline></video>
        <img class="bg-media img-el hidden">
        <iframe class="bg-media iframe-el hidden" frameborder="0" allowusermedia
            allow="camera *; microphone *; autoplay *; display-capture *; fullscreen *; clipboard-read; clipboard-write"
            style="border:none; width:100%; height:100%; position:absolute; top:0; left:0;"></iframe>
    </div>
</div>
<div id="pres-layer" class="media-layer hidden"
    style="position: absolute; top:0; left:0; width:100%; height:100%; z-index: 10; background: #000; overflow: hidden;">
    <canvas id="pres-canvas-1" class="pres-canvas active"
        style="position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); max-width: 100%; max-height: 100%; object-fit: contain; transition: opacity 0.8s; opacity: 0;"></canvas>
    <canvas id="pres-canvas-2" class="pres-canvas"
        style="position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); max-width: 100%; max-height: 100%; object-fit: contain; transition: opacity 0.8s; opacity: 0;"></canvas>
</div>
<div id="lyrics-container" class="lyrics">
    <div id="lyrics-text" class="fade-in">
        <!-- Lyrics will appear here -->
    </div>
    <div id="live-text" class="fade-in hidden">
        <!-- Live lyrics will appear here -->
    </div>
    <div id="live2-text" class="fade-in hidden">
        <!-- Live2 lyrics will appear here -->
    </div>
    <div id="birthday-output" class="fade-in hidden">
        <h1 id="birthday-header">Birthday Celebrants</h1>
        <ul id="birthday-list"></ul>
    </div>
    <div id="announcement-output" class="fade-in hidden">
        <h1 id="announcement-title"></h1>
        <div id="announcement-content"></div>
    </div>
    <div id="bible-output" class="fade-in hidden">
        <h1 id="bible-reference"></h1>
        <div id="bible-text-content"></div>
        <br>
        <div id="bible-parallel-content"></div>
    </div>
</div>

<div id="pres-pointer"
    style="position: absolute; width: 15px; height: 15px; border-radius: 50%; background: red; z-index: 1000; display: none; pointer-events: none; box-shadow: 0 0 10px rgba(255,0,0,0.8), 0 0 20px rgba(255,0,0,0.4); transform: translate(-50%, -50%); transition: top 0.1s linear, left 0.1s linear;">
</div>
{% endblock %}
