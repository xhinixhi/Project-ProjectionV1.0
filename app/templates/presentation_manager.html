{% extends "layout.html" %}

{% block title %}Powerpoint (PDF) Pro - SongLyrics Projection{% endblock %}

{% block content %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<div class="presenter-container"
    style="display: flex; height: 100vh; background: #0a0a0a; color: #eee; overflow: hidden;">

    <!-- Left Sidebar: Thumbnail List -->
    <div class="thumbnails-sidebar"
        style="width: 250px; background: #111; border-right: 1px solid #333; display: flex; flex-direction: column;">
        <div style="padding: 15px; border-bottom: 1px solid #333;">
            <button class="btn-primary" onclick="showUploadModal()" style="width: 100%;">+ Upload PDF</button>
        </div>
        <div id="thumbnail-list" style="flex: 1; overflow-y: auto; padding: 10px;">
            <!-- Thumbnails will appear here -->
            <div style="text-align: center; color: #666; margin-top: 50px;">
                Select a presentation to begin
            </div>
        </div>
    </div>

    <!-- Main Workspace -->
    <div class="main-workspace" style="flex: 1; display: flex; flex-direction: column;">

        <!-- Header: Top Controls -->
        <div class="presenter-header"
            style="height: 60px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; padding: 0 20px; gap: 20px;">
            <select id="presentation-select"
                style="background: #333; color: white; border: 1px solid #444; padding: 8px 15px; border-radius: 4px; min-width: 200px;"
                onchange="const opt=this.options[this.selectedIndex]; loadPresentation(opt.value, 1, opt.dataset.id)">
                <option value="">-- Choose Presentation --</option>
                {% for pres in presentations %}
                <option value="{{ pres.filename }}" data-id="{{ pres.id }}">{{ pres.name }}</option>
                {% endfor %}
            </select>
            <button class="btn-secondary" style="background: transparent; border: 1px solid #444; padding: 8px 10px; border-radius: 4px;" onclick="editPresentationTitle()" title="Edit Title">✏️</button>

            <div style="flex: 1; text-align: center; font-weight: bold; font-size: 1.2rem;" id="current-slide-num">
                Slide 0 of 0
            </div>

            <div style="display: flex; gap: 10px; align-items: center;">
                <div style="display: flex; align-items: center; gap: 8px; margin-right: 15px;">
                    <label class="switch" style="position: relative; display: inline-block; width: 40px; height: 20px;">
                        <input type="checkbox" id="remote-toggle" onchange="toggleRemote(this.checked)" style="opacity: 0; width: 0; height: 0;">
                        <span class="slider" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; transition: .4s; border-radius: 20px;"></span>
                    </label>
                    <a href="{{ url_for('powerpoint.remote') }}" target="_blank"
                        style="text-decoration: none; color: #aaa; font-size: 0.9rem;"
                        title="Open Mobile Remote">📱 Remote</a>
                </div>
                <div style="display: flex; align-items: center; gap: 8px; margin-right: 15px; border-left: 1px solid #333; padding-left: 15px;">
                    <span style="font-size: 0.8rem; color: #888;">Pointer:</span>
                    <input type="color" id="pointer-color" value="#ff0000" oninput="updatePointerColor(this.value)" 
                        style="width: 25px; height: 25px; border: none; background: transparent; cursor: pointer; padding: 0;">
                    <input type="range" id="pointer-size" min="5" max="150" value="15" oninput="document.getElementById('pointer-size-num').value = this.value; updatePointerSize(this.value)" 
                        style="width: 50px; height: 4px; accent-color: #28a745;" title="Pointer Size Slider">
                    <input type="number" id="pointer-size-num" min="5" max="150" value="15" oninput="document.getElementById('pointer-size').value = this.value; updatePointerSize(this.value)"
                        style="width: 45px; background: #222; color: #eee; border: 1px solid #444; border-radius: 4px; padding: 2px 4px; font-size: 0.8rem;">
                </div>

                <button class="btn-secondary" onclick="prevSlide()">◀ Previous</button>
                <button class="btn-primary" onclick="nextSlide()" style="background: #28a745;">Next Slide ▶</button>
            </div>

            <button class="btn-danger" style="background: #a52a2a" onclick="deleteCurrentPresentation()">🗑️</button>
        </div>

        <!-- Previews -->
        <div class="previews-row" style="flex: 1; display: flex; gap: 20px; padding: 20px; overflow: hidden;">
            <!-- Current Slide -->
            <div class="current-slide-zone" style="flex: 2; display: flex; flex-direction: column;">
                <div
                    style="font-size: 0.8rem; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;">
                    Live Now</div>
                <div
                    style="flex: 1; background: #000; border: 2px solid #28a745; border-radius: 8px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                    <canvas id="current-slide-canvas"
                        style="max-width: 100%; max-height: 100%; object-fit: contain;"></canvas>
                </div>
            </div>

            <!-- Next Slide -->
            <div class="next-slide-zone" style="flex: 1; display: flex; flex-direction: column;">
                <div
                    style="font-size: 0.8rem; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;">
                    Coming Up Next</div>
                <div
                    style="flex: 1; background: #000; border: 1px solid #444; border-radius: 8px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; opacity: 0.7;">
                    <canvas id="next-slide-canvas"
                        style="max-width: 100%; max-height: 100%; object-fit: contain;"></canvas>
            </div>
        </div>
    </div>
</div>

<!-- Upload Modal -->
<div id="upload-modal" class="hidden"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: flex; align-items: center; justify-content: center;">
    <div class="settings-panel"
        style="width: 450px; background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333;">
        <h2>Upload Presentation (PDF)</h2>
        <div class="setting-group"
            style="flex-direction: column; align-items: flex-start; gap: 10px; margin-bottom: 20px;">
            <label>Name</label>
            <input type="text" id="upload-name" placeholder="e.g., Sunday Service Slides"
                style="width: 100%; padding: 10px;">
        </div>
        <div class="setting-group"
            style="flex-direction: column; align-items: flex-start; gap: 10px; margin-bottom: 20px;">
            <label>Select PDF File</label>
            <input type="file" id="upload-file" accept=".pdf" style="width: 100%; color: #888;">
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn-primary" style="flex: 1;" onclick="handleUpload()">Upload</button>
            <button class="btn-secondary" style="flex: 1;" onclick="hideUploadModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let pdfDoc = null;
    let currentFilename = null;
    let currentPageNum = 1;
    let totalPages = 0;
    let isRendering = false;
    let remoteEnabled = localStorage.getItem('remote_enabled') === 'true';
    let isHijacked = false;

    let currentPresId = null;

    async function loadPresentation(filename, restorePage = 1, id = null) {
        if (!filename) return;
        currentFilename = filename;
        currentPresId = id || localStorage.getItem('last_pres_id');
        localStorage.setItem('last_pres_filename', filename);
        if (currentPresId) localStorage.setItem('last_pres_id', currentPresId);

        const url = `/static/uploads/presentations/${filename}`;

        try {
            pdfDoc = await pdfjsLib.getDocument(url).promise;
            totalPages = pdfDoc.numPages;

            // Constrain initial page bounds just in case
            if (restorePage < 1) restorePage = 1;
            if (restorePage > totalPages) restorePage = totalPages;

            currentPageNum = restorePage;
            renderAll();
            generateThumbnails();
        } catch (e) {
            console.error("Error loading PDF:", e);
            alert("Failed to load PDF presentation.");
        }
    }

    // Restore state on load
    window.addEventListener('load', () => {
        const savedFile = localStorage.getItem('last_pres_filename');
        let savedPage = parseInt(localStorage.getItem('last_pres_page')) || 1;
        const savedId = localStorage.getItem('last_pres_id');
        
        document.getElementById('remote-toggle').checked = remoteEnabled;

        // Handle direct remote commands from cross-tab redirect
        const urlParams = new URLSearchParams(window.location.search);
        const remoteCmd = urlParams.get('remote_cmd');
        if (remoteCmd === 'next' && remoteEnabled) savedPage++;
        if (remoteCmd === 'prev' && remoteEnabled) savedPage--;

        if (savedFile) {
            document.getElementById('presentation-select').value = savedFile;
            loadPresentation(savedFile, savedPage, savedId);
            
            // Clean URL
            if (remoteCmd) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }
    });

    async function renderPage(num, canvasId) {
        if (!pdfDoc) return;
        const page = await pdfDoc.getPage(num);
        const canvas = document.getElementById(canvasId);
        const context = canvas.getContext('2d');

        const viewport = page.getViewport({ scale: 1.5 });
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        const renderContext = {
            canvasContext: context,
            viewport: viewport
        };
        await page.render(renderContext).promise;
    }

    let pendingRender = false;

    async function renderAll() {
        if (isRendering) {
            // Queue up a render if one is currently happening, so we don't drop multiple fast clicks
            pendingRender = true;
            // Still MUST project immediately to output since local render might be paused if tab is in background!
            projectToOutput();
            return;
        }

        isRendering = true;

        document.getElementById('current-slide-num').innerText = `Slide ${currentPageNum} of ${totalPages}`;
        localStorage.setItem('last_pres_page', currentPageNum);

        // 1. Immediately fire projection so the live output updates instantly,
        // even if this tab is in the background and local canvas rendering is paused.
        projectToOutput();
        broadcastState();

        // 2. Highlight thumbnail instantly
        document.querySelectorAll('.thumbnail-item').forEach(item => {
            item.classList.toggle('active', item.dataset.page == currentPageNum);
        });

        // 3. Render local previews
        try {
            await renderPage(currentPageNum, 'current-slide-canvas');

            if (currentPageNum < totalPages) {
                await renderPage(currentPageNum + 1, 'next-slide-canvas');
            } else {
                const canvas = document.getElementById('next-slide-canvas');
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            }
        } catch (e) {
            console.error("Render error (possibly tab suspended):", e);
        } finally {
            isRendering = false;
            if (pendingRender) {
                pendingRender = false;
                renderAll(); // flush queued render
            }
        }
    }

    function toggleRemote(enabled) {
        remoteEnabled = enabled;
        localStorage.setItem('remote_enabled', enabled);
        broadcastState();
    }

    function broadcastState() {
        if (!pdfDoc) return;
        const selectEl = document.getElementById('presentation-select');
        const presTitle = selectEl.options[selectEl.selectedIndex].text;
        const ptrColor = localStorage.getItem('pointer_color') || '#ff0000';
        const ptrSize = localStorage.getItem('pointer_size') || '15';
        presSocket.emit('powerpoint_state_update', { 
            current: currentPageNum, 
            total: totalPages, 
            remote_enabled: remoteEnabled, 
            title: presTitle,
            pointer_color: ptrColor,
            pointer_size: ptrSize
        });
        // Also explicitly relay the color/size just in case
        presSocket.emit('powerpoint_pointer_color_update', { color: ptrColor });
        presSocket.emit('powerpoint_pointer_size_update', { size: ptrSize });
    }


    async function generateThumbnails() {
        const list = document.getElementById('thumbnail-list');
        list.innerHTML = '';

        for (let i = 1; i <= totalPages; i++) {
            const item = document.createElement('div');
            item.className = 'thumbnail-item';
            item.dataset.page = i;
            item.style = "margin-bottom: 10px; cursor: pointer; border: 2px solid transparent; border-radius: 4px; overflow: hidden; position: relative;";
            item.onclick = () => goToSlide(i);

            const canvas = document.createElement('canvas');
            canvas.style = "width: 100%; display: block; filter: brightness(0.8);";
            item.appendChild(canvas);

            const label = document.createElement('div');
            label.innerText = i;
            label.style = "position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); color: white; padding: 2px 6px; font-size: 0.7rem; border-radius: 3px;";
            item.appendChild(label);

            list.appendChild(item);

            // Render thumbnail (low scale)
            const page = await pdfDoc.getPage(i);
            const viewport = page.getViewport({ scale: 0.3 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
        }

        document.querySelector(`.thumbnail-item[data-page="${currentPageNum}"]`).classList.add('active');
    }

    function goToSlide(num) {
        isHijacked = false;
        if (num < 1 || num > totalPages) {
            // Still project to output because they might have pressed the button just to revert the screen back to the presentation
            projectToOutput();
            broadcastState();
            return;
        }
        currentPageNum = num;
        renderAll();
    }

    function nextSlide() { 
        if (isHijacked) {
            isHijacked = false;
            projectToOutput();
            broadcastState();
            return;
        }
        goToSlide(currentPageNum + 1); 
    }
    function prevSlide() { 
        if (isHijacked) {
            isHijacked = false;
            projectToOutput();
            broadcastState();
            return;
        }
        goToSlide(currentPageNum - 1); 
    }

    function projectToOutput() {
        fetch('/powerpoint/api/project', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: currentFilename, page_num: currentPageNum })
        });
    }

    // Modal & Upload Logic
    function showUploadModal() { document.getElementById('upload-modal').classList.remove('hidden'); }
    function hideUploadModal() { document.getElementById('upload-modal').classList.add('hidden'); }

    function handleUpload() {
        const name = document.getElementById('upload-name').value;
        const fileInput = document.getElementById('upload-file');
        const file = fileInput.files[0];

        if (!file) return alert("Select a PDF file");

        const formData = new FormData();
        formData.append('file', file);
        formData.append('name', name);

        fetch('/powerpoint/upload', {
            method: 'POST',
            body: formData
        }).then(res => res.json()).then(data => {
            if (data.status === 'success') {
                window.location.reload();
            } else {
                alert(data.error);
            }
        });
    }

    function editPresentationTitle() {
        if (!currentPresId) return alert("Select a presentation first");
        
        const selectEl = document.getElementById('presentation-select');
        const currentTitle = selectEl.options[selectEl.selectedIndex].text;
        const newTitle = prompt("Enter new title for the presentation:", currentTitle);
        
        if (newTitle && newTitle !== currentTitle) {
            fetch(`/powerpoint/api/update_title/${currentPresId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: newTitle })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    // Update the text in the dropdown
                    selectEl.options[selectEl.selectedIndex].text = data.name;
                    broadcastState(); // Update remote as well
                } else {
                    alert("Failed to update title");
                }
            });
        }
    }

    function deleteCurrentPresentation() {
        if (!currentPresId) return alert("Select a presentation first");

        if (!confirm("Are you sure you want to delete this entire presentation? This cannot be undone.")) return;

        fetch(`/powerpoint/api/delete/${currentPresId}`, {
            method: 'POST'
        }).then(res => res.json()).then(data => {
            if (data.status === 'success') {
                localStorage.removeItem('last_pres_filename');
                localStorage.removeItem('last_pres_page');
                localStorage.removeItem('last_pres_id');
                window.location.reload();
            } else {
                alert("Failed to delete presentation");
            }
        });
    }

    // Keyboard controls
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') nextSlide();
        if (e.key === 'ArrowLeft' || e.key === 'PageUp') prevSlide();
    });

    // Remote Control Integration
    const presSocket = io({ transports: ['websocket', 'polling'] });
    presSocket.on('powerpoint_remote_cmd_relay', (data) => {
        if (!pdfDoc || !remoteEnabled) return; // Ignore if no presentation is active or remote disabled
        if (data.command === 'next') {
            nextSlide();
        } else if (data.command === 'prev') {
            prevSlide();
        }
    });
    
    presSocket.on('request_powerpoint_state_relay', () => {
        if (pdfDoc) broadcastState();
    });

    // Handle hijacking detection
    const hijackEvents = ['update_slide', 'update_bible_slide', 'update_birthday_slide', 'update_announcement_slide', 'clear_output'];
    hijackEvents.forEach(evt => {
        presSocket.on(evt, () => {
            isHijacked = true;
            console.log("PowerPoint hijacked by " + evt);
        });
    });

    function updatePointerColor(color) {
        localStorage.setItem('pointer_color', color);
        presSocket.emit('powerpoint_pointer_color_update', { color: color });
    }

    function updatePointerSize(size) {
        localStorage.setItem('pointer_size', size);
        presSocket.emit('powerpoint_pointer_size_update', { size: size });
        
        // Sync inputs
        const range = document.getElementById('pointer-size');
        const num = document.getElementById('pointer-size-num');
        if (range.value !== size) range.value = size;
        if (num.value !== size) num.value = size;
    }

    // Initialize pointer color and size
    window.addEventListener('load', () => {
        const savedColor = localStorage.getItem('pointer_color') || '#ff0000';
        const colorInput = document.getElementById('pointer-color');
        if (colorInput) colorInput.value = savedColor;
        
        const savedSize = localStorage.getItem('pointer_size') || '15';
        const sizeInput = document.getElementById('pointer-size');
        const sizeNumInput = document.getElementById('pointer-size-num');
        if (sizeInput) sizeInput.value = savedSize;
        if (sizeNumInput) sizeNumInput.value = savedSize;
    });

</script>


<style>
    .presenter-container {
        font-family: 'Inter', sans-serif;
    }

    .thumbnail-item:hover {
        border-color: #555 !important;
    }

    .thumbnail-item.active {
        border-color: #28a745 !important;
    }

    .thumbnail-item.active canvas {
        filter: brightness(1) !important;
    }

    .hidden {
        display: none !important;
    }

    .btn-danger:hover {
        background: #ff4d4d !important;
    }

    /* Slider Switch Styles */
    .slider { background-color: #dc3545; position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; transition: .4s; border-radius: 20px; }
    .switch input:checked + .slider { background-color: #28a745; }
    .switch input:checked + .slider:before { transform: translateX(20px); }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
</style>

{% endblock %}
